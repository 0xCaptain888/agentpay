[tool.poetry]
name = "agentpay"
version = "0.1.0"
description = "AgentPay Python SDK — Vault client and HTTP 402 paywall for AI agents on Solana"
authors = ["AgentPay Team"]
license = "MIT"
readme = "README.md"
packages = [{include = "agentpay"}]

[tool.poetry.dependencies]
python = "^3.11"
solana = "^0.36.0"
anchorpy = "^0.21.0"
solders = "^0.23.0"
httpx = "^0.27.0"
pydantic = "^2.9.0"
fastapi = "^0.115.0"
base58 = "^2.1.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
pytest-asyncio = "^0.24"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
